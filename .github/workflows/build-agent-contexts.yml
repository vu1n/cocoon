name: Build agent-contexts aggregate

# Daily cron + manual trigger. Harvests each CLI's tools-manifest.json
# from the printing-press-library source tree (~96 of ~135 CLIs as of
# writing — the rest are hand-rolled and don't ship a manifest yet),
# translates each into agent-context shape, aggregates into
# src/cocoon/data/agent_contexts.json, commits the result if changed.
#
# This file is the lowest-priority catalog layer at runtime: cocoon
# prefers the local agent-context cache (captured post-install on the
# user's machine) and falls back to this bundle for pre-install
# discovery — `cocoon find "<query>"` returns real endpoints across the
# corpus even before the user has installed anything.
#
# Pure HTTP fetches, no Go toolchain, ~30s wall-clock for all 135
# entries. Phase 2 (TBD) will add a binary-execution fallback for the
# ~29% of CLIs without a tools-manifest.

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC daily — off the hour to avoid cron pile-up
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: build-agent-contexts
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install cocoon deps
        run: uv sync --extra dev

      - name: Harvest tools-manifest into aggregate
        run: |
          uv run python scripts/build_agent_contexts.py
          wc -c src/cocoon/data/agent_contexts.json

      - name: Commit if changed
        run: |
          if git diff --quiet src/cocoon/data/agent_contexts.json; then
            echo "no changes to agent_contexts.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/cocoon/data/agent_contexts.json
          git commit -m "data: refresh agent_contexts aggregate [skip ci]"
          git push
