[project]
name = "cocoon"
version = "0.2.0"
description = "MCP facade over the printing-press CLI corpus: discover and call any API in the catalog through four meta-tools, with per-call sandboxed execution."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "vu1n" }]
keywords = ["mcp", "claude", "agent", "printing-press", "sandbox"]
dependencies = [
    "mcp>=1.2",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[project.scripts]
cocoon = "cocoon.cli:main"

[project.urls]
Repository = "https://github.com/vu1n/claude-skills"
Skill = "https://github.com/vu1n/claude-skills/tree/main/skills/cocoon"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cocoon"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
